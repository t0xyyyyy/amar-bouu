<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    color: white;
}

/* Glass box */
.container {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Input */
input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
    width: 200px;
}

/* Button */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    margin-top: 15px;
    background: white;
    color: #ff4b7d;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4b7d;
    color: white;
}

/* Floating hearts */
.heart {
    position: absolute;
    bottom: -10px;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}

/* Typing text */
#typing {
    font-size: 1.5em;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="container">
    <h2 id="typing"></h2>
    <p>Enter our secret ❤️</p>

    <input type="password" id="pass" placeholder="Enter password">
    <br>
    <button onclick="check()">Unlock 💖</button>
</div>

<script>
// Typing effect
let text = "Welcome My Love ❤️";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 80);
    }
}
type();

// Password check
function check() {
    let password = document.getElementById("pass").value;

    if(password === "love123") {
        let musicStart = new Audio("music.mp3");
musicStart.play().then(() => {
    window.location.href = "home.html";
});
    } else {
        alert("Wrong password 😢 Try again!");
    }
}

// Floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>

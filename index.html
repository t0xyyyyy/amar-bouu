<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffffff, #ffe4ec);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    color: black;
}

/* Blur overlay for transition */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(20px);
    opacity: 0;
    transition: 1s;
    pointer-events: none;
}

/* Glass card */
.container {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Input */
input {
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 15px;
    width: 220px;
    outline: none;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    margin-top: 15px;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* Glow effect */
button {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 10px #667eea; }
    to { box-shadow: 0 0 25px #764ba2; }
}

button:hover {
    transform: scale(1.05);
}

/* Floating particles */
.particle {
    position: absolute;
    bottom: -10px;
    font-size: 14px;
    opacity: 0.7;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}

#typing {
    font-size: 1.6em;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div id="overlay"></div>

<div class="container">
    <h2 id="typing"></h2>
    <p>Aap mere kon? ✨</p>

    <input type="password" id="pass" placeholder="Password">
    <br>
    <button onclick="check()">Open suprise 🎁</button>
</div>

<!-- Soft background music -->
<audio id="loginMusic" loop>
  <source src="music1.mp3" type="audio/mpeg">
</audio>

<script>
// Typing effect
let text = "A Little Surprise For You 💖";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 80);
    }
}
type();

// Play music on first click
document.addEventListener("click", function() {
    let music = document.getElementById("loginMusic");
    music.volume = 0.3;
    music.play();
}, { once: true });

// Password check
function check() {
    let password = document.getElementById("pass").value;

    if(password === "bou") {

        // Blur transition
        let overlay = document.getElementById("overlay");
        overlay.style.opacity = "1";

        setTimeout(() => {
            window.location.href = "home.html";
        }, 1000);

    } else {
        alert(" Hint: woh likhe try karo joh mai abhi se manta hu 🤌!");
    }
}

// Floating particles
setInterval(() => {
    let p = document.createElement("div");
    p.innerHTML = Math.random() > 0.5 ? "✨" : "❤️";
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(p);

    setTimeout(() => p.remove(), 6000);
}, 400);
</script>

</body>
</html>
